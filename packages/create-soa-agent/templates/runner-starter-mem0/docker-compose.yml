# mem0-backed Memory MCP stack for create-soa-agent demos.
# Requires Ollama running on the host (default http://localhost:11434)
# OR OPENAI_API_KEY set before `docker compose up`.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: soa-demo-qdrant
    restart: on-failure
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:6333/ | grep -q qdrant"]
      interval: 5s
      timeout: 3s
      retries: 10

  mem0:
    image: node:20-alpine
    container_name: soa-demo-mem0
    restart: on-failure
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8006:8006"
    environment:
      - HOST=0.0.0.0
      - PORT=8006
      - SOA_MEMORY_MCP_MEM0_PROVIDER=${SOA_MEMORY_MCP_MEM0_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: >
      sh -c "npm install --omit=dev --prefix /tmp @soa-harness/memory-mcp-mem0@^1.0.0-rc.0 &&
             node /tmp/node_modules/@soa-harness/memory-mcp-mem0/dist/bin/start-mem0.js"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant-data:
