# Zep v0.27.2 config baked with LLM-requiring extractors disabled so the
# server boots without an OpenAI key. Only Document Collection embeddings
# (local MiniLM via the bundled NLP server) are needed for §8.1.

llm:
  service: "openai"
  model: "gpt-4o-mini"

nlp:
  server_url: "http://nlp:5557"

memory:
  message_window: 12

extractors:
  documents:
    embeddings:
      enabled: true
      chunk_size: 1000
      dimensions: 384
      service: "local"
  messages:
    summarizer:
      enabled: false
    entities:
      enabled: false
    intent:
      enabled: false
    embeddings:
      enabled: false

store:
  type: "postgres"
  postgres:
    dsn: "postgres://postgres:postgres@db:5432/postgres?sslmode=disable"

server:
  host: 0.0.0.0
  port: 8000
  web_enabled: false
  max_request_size: 5242880

auth:
  required: false
  secret: "soa-harness-memory-mcp-zep-local"

data:
  purge_every: 0

log:
  level: "info"

opentelemetry:
  enabled: false
